<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Slide Escape oyun görseli</title>
  <desc id="desc">Neon bir 6 çarpı 6 tahtada kaydırılabilir mavi bloklar ve pembe hedef blok.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d946ef"/><stop offset="1" stop-color="#f43f5e"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="55" height="55" patternUnits="userSpaceOnUse"><path d="M55 0H0V55" fill="none" stroke="#334155" stroke-opacity=".55"/></pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="690" cy="70" r="180" fill="#06b6d4" opacity=".06"/>
  <g transform="translate(210 55)">
    <rect width="330" height="330" rx="24" fill="#020617" stroke="#475569" stroke-width="8"/>
    <rect width="330" height="330" rx="20" fill="url(#grid)"/>
    <path d="M330 110h58v55h-58" fill="#06b6d4" opacity=".12" stroke="#22d3ee" stroke-width="3" filter="url(#glow)"/>
    <g fill="url(#blue)" stroke="#67e8f9" stroke-width="2">
      <rect x="8" y="8" width="149" height="47" rx="10"/><rect x="173" y="8" width="47" height="102" rx="10"/>
      <rect x="228" y="8" width="94" height="47" rx="10"/><rect x="8" y="173" width="47" height="149" rx="10"/>
      <rect x="63" y="228" width="157" height="47" rx="10"/><rect x="228" y="173" width="47" height="149" rx="10"/>
      <rect x="283" y="173" width="39" height="102" rx="10"/>
    </g>
    <rect x="63" y="118" width="102" height="39" rx="10" fill="url(#pink)" stroke="#fda4af" stroke-width="2" filter="url(#glow)"/>
    <path d="M178 138h120" stroke="#fff" stroke-opacity=".75" stroke-width="7" stroke-linecap="round"/><path d="m287 126 15 12-15 12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="38" y="76" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="4">NESSYGAMES</text>
  <text x="38" y="118" fill="#fff" font-family="system-ui,sans-serif" font-size="38" font-weight="900">SLIDE</text>
  <text x="38" y="158" fill="#f472b6" font-family="system-ui,sans-serif" font-size="38" font-weight="900">ESCAPE</text>
</svg>
